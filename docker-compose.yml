services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    command: >
      gunicorn src.api:app
      --workers 3
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000

  streamlit:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    restart: unless-stopped
    command: >
      streamlit run src/web_app.py
      --server.port=8501
      --server.address=0.0.0.0